<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky:    #1a6ddf;
      --sky2:   #0d3b8c;
      --accent: #f97316;
      --cold:   #60a5fa;
      --card-bg: rgba(255,255,255,0.12);
      --card-border: rgba(255,255,255,0.22);
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, var(--sky2) 0%, var(--sky) 60%, #3b82f6 100%);
      color: #fff;
      transition: background 1s ease;
      padding: 2rem 1rem 4rem;
    }

    /* ── Dynamic sky themes ── */
    body.sunny  { background: linear-gradient(145deg, #1d4ed8 0%, #2563eb 50%, #facc15 100%); }
    body.cloudy { background: linear-gradient(145deg, #374151 0%, #6b7280 60%, #9ca3af 100%); }
    body.rainy  { background: linear-gradient(145deg, #1e3a5f 0%, #2563eb 50%, #60a5fa 100%); }
    body.snowy  { background: linear-gradient(145deg, #334155 0%, #64748b 50%, #e2e8f0 100%); }
    body.stormy { background: linear-gradient(145deg, #0f172a 0%, #1e293b 60%, #334155 100%); }

    /* ── Header / search ── */
    header {
      max-width: 860px;
      margin: 0 auto 2.5rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.35);
      margin-bottom: 1.4rem;
    }

    .search-bar {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .search-bar input {
      flex: 1 1 260px;
      max-width: 340px;
      padding: 0.7rem 1.1rem;
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.18);
      color: #fff;
      font-size: 1rem;
      outline: none;
      backdrop-filter: blur(6px);
      transition: border-color 0.25s, background 0.25s;
    }
    .search-bar input::placeholder { color: rgba(255,255,255,0.65); }
    .search-bar input:focus {
      border-color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.26);
    }

    .unit-toggle {
      display: flex;
      background: rgba(255,255,255,0.18);
      border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.35);
      overflow: hidden;
      backdrop-filter: blur(6px);
    }
    .unit-toggle button {
      padding: 0.7rem 1rem;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: background 0.2s, color 0.2s;
    }
    .unit-toggle button.active {
      background: rgba(255,255,255,0.3);
      color: #fff;
    }

    .btn-search {
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(249,115,22,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-search:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(249,115,22,0.5); }
    .btn-search:active { transform: translateY(0); }

    /* ── Main content ── */
    main {
      max-width: 860px;
      margin: 0 auto;
    }

    #location-heading {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.8rem;
      opacity: 0;
      transition: opacity 0.5s;
      text-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    #location-heading.visible { opacity: 1; }

    /* ── Forecast cards ── */
    #forecast-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 640px) {
      #forecast-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 380px) {
      #forecast-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .day-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1rem 0.5rem;
      text-align: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
      opacity: 0;
      transform: translateY(18px);
      animation: cardIn 0.45s forwards;
    }
    .day-card:hover {
      transform: translateY(-4px) scale(1.04);
      background: rgba(255,255,255,0.22);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .day-card.selected {
      background: rgba(255,255,255,0.28);
      border-color: rgba(255,255,255,0.6);
      box-shadow: 0 8px 28px rgba(0,0,0,0.3);
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-day   { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.8; }
    .card-date  { font-size: 0.65rem; opacity: 0.65; margin-bottom: 0.5rem; }
    .card-icon  { font-size: 2rem; margin: 0.3rem 0; line-height: 1; }
    .card-desc  { font-size: 0.6rem; opacity: 0.7; margin-bottom: 0.5rem; min-height: 1.5em; }
    .card-high  { font-size: 1.05rem; font-weight: 700; color: #fbbf24; }
    .card-low   { font-size: 0.85rem; color: #93c5fd; margin-top: 0.15rem; }
    .card-rain  { font-size: 0.6rem; opacity: 0.7; margin-top: 0.3rem; }

    /* ── Chart ── */
    .chart-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 1.5rem 1.2rem 1rem;
      backdrop-filter: blur(8px);
      margin-bottom: 2rem;
      opacity: 0;
      transition: opacity 0.6s 0.2s;
    }
    .chart-panel.visible { opacity: 1; }

    .chart-title {
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0.75;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ── Detail panel ── */
    #detail-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 1.4rem 1.4rem;
      backdrop-filter: blur(8px);
      display: none;
      gap: 1.2rem;
      animation: slideUp 0.3s ease;
    }
    #detail-panel.visible { display: flex; flex-wrap: wrap; align-items: center; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .detail-icon  { font-size: 3.5rem; line-height: 1; }
    .detail-info  { flex: 1 1 200px; }
    .detail-info h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.3rem; }
    .detail-info p  { font-size: 0.85rem; opacity: 0.75; }

    .detail-stats {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }
    .stat {
      background: rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0.6rem 1rem;
      min-width: 90px;
      text-align: center;
    }
    .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.65; }
    .stat-value { font-size: 1.1rem; font-weight: 700; margin-top: 0.2rem; }

    /* ── Status / error ── */
    #status {
      text-align: center;
      padding: 1.2rem;
      font-size: 1rem;
      opacity: 0.85;
      min-height: 60px;
    }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.08) 25%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.08) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 16px;
      height: 140px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.72rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>

<header>
  <h1>&#x1F324; Weather Dashboard</h1>
  <div class="search-bar">
    <input type="text" id="city-input" placeholder="Enter city name…" autocomplete="off" />
    <div class="unit-toggle">
      <button id="btn-f" class="active" onclick="setUnit('fahrenheit')">°F</button>
      <button id="btn-c" onclick="setUnit('celsius')">°C</button>
    </div>
    <button class="btn-search" onclick="search()">Search</button>
  </div>
</header>

<main>
  <div id="status">Enter a city above to see the 7-day forecast.</div>
  <div id="location-heading"></div>
  <div id="forecast-grid"></div>
  <div class="chart-panel" id="chart-panel">
    <div class="chart-title">Temperature trend</div>
    <canvas id="tempChart" height="120"></canvas>
  </div>
  <div id="detail-panel"></div>
</main>

<footer>Data: <a href="https://open-meteo.com/" style="color:inherit">Open-Meteo</a> (free, no API key needed)</footer>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const GEO_URL      = 'https://geocoding-api.open-meteo.com/v1/search';
const FORECAST_URL = 'https://api.open-meteo.com/v1/forecast';

let unit      = 'fahrenheit';
let chartInst = null;
let lastData  = null;   // cache last API response so unit toggle re-renders instantly

// WMO weather code → { emoji, label, theme }
const WMO = {
  0:  { emoji:'☀️',  label:'Clear sky',          theme:'sunny'  },
  1:  { emoji:'🌤️',  label:'Mainly clear',        theme:'sunny'  },
  2:  { emoji:'⛅',  label:'Partly cloudy',       theme:'cloudy' },
  3:  { emoji:'☁️',  label:'Overcast',            theme:'cloudy' },
  45: { emoji:'🌫️',  label:'Foggy',               theme:'cloudy' },
  48: { emoji:'🌫️',  label:'Icy fog',             theme:'cloudy' },
  51: { emoji:'🌦️',  label:'Light drizzle',       theme:'rainy'  },
  53: { emoji:'🌦️',  label:'Drizzle',             theme:'rainy'  },
  55: { emoji:'🌧️',  label:'Heavy drizzle',       theme:'rainy'  },
  61: { emoji:'🌧️',  label:'Light rain',          theme:'rainy'  },
  63: { emoji:'🌧️',  label:'Rain',                theme:'rainy'  },
  65: { emoji:'🌧️',  label:'Heavy rain',          theme:'rainy'  },
  71: { emoji:'🌨️',  label:'Light snow',          theme:'snowy'  },
  73: { emoji:'🌨️',  label:'Snow',                theme:'snowy'  },
  75: { emoji:'❄️',  label:'Heavy snow',           theme:'snowy'  },
  77: { emoji:'🌨️',  label:'Snow grains',         theme:'snowy'  },
  80: { emoji:'🌦️',  label:'Light showers',       theme:'rainy'  },
  81: { emoji:'🌧️',  label:'Showers',             theme:'rainy'  },
  82: { emoji:'🌧️',  label:'Violent showers',     theme:'rainy'  },
  85: { emoji:'🌨️',  label:'Snow showers',        theme:'snowy'  },
  86: { emoji:'❄️',  label:'Heavy snow showers',  theme:'snowy'  },
  95: { emoji:'⛈️',  label:'Thunderstorm',        theme:'stormy' },
  96: { emoji:'⛈️',  label:'Thunderstorm + hail', theme:'stormy' },
  99: { emoji:'⛈️',  label:'Thunderstorm + hail', theme:'stormy' },
};

function wmo(code) {
  return WMO[code] ?? { emoji:'🌡️', label:'Unknown', theme:'' };
}

// ── Unit helpers ───────────────────────────────────────────────────────────
function setUnit(u) {
  unit = u;
  document.getElementById('btn-f').classList.toggle('active', u === 'fahrenheit');
  document.getElementById('btn-c').classList.toggle('active', u === 'celsius');
  if (lastData) render(lastData);
}

function unitSymbol() { return unit === 'fahrenheit' ? '°F' : '°C'; }

// ── Fetch helpers ──────────────────────────────────────────────────────────
async function geocode(city) {
  const url = `${GEO_URL}?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Geocoding request failed.');
  const data = await res.json();
  if (!data.results?.length) throw new Error(`City "${city}" not found.`);
  const r = data.results[0];
  const parts = [r.name];
  if (r.admin1)  parts.push(r.admin1);
  if (r.country) parts.push(r.country);
  return { lat: r.latitude, lon: r.longitude, name: parts.join(', ') };
}

async function fetchForecast(lat, lon, tempUnit) {
  const params = new URLSearchParams({
    latitude: lat, longitude: lon,
    daily: [
      'temperature_2m_max','temperature_2m_min',
      'weathercode','precipitation_sum','windspeed_10m_max'
    ].join(','),
    timezone: 'auto',
    forecast_days: 7,
    temperature_unit: tempUnit,
    windspeed_unit: 'mph',
    precipitation_unit: 'inch',
  });
  const res = await fetch(`${FORECAST_URL}?${params}`);
  if (!res.ok) throw new Error('Forecast request failed.');
  return res.json();
}

// ── Main search flow ───────────────────────────────────────────────────────
async function search() {
  const city = document.getElementById('city-input').value.trim();
  if (!city) return;

  setStatus('🔍 Looking up ' + city + '…');
  clearForecast();

  try {
    const { lat, lon, name } = await geocode(city);
    setStatus('📡 Fetching forecast for ' + name + '…');
    showSkeletons();
    const data = await fetchForecast(lat, lon, unit);
    lastData = { forecast: data, name };
    render(lastData);
  } catch (err) {
    setStatus('⚠️ ' + err.message);
  }
}

// ── Render ─────────────────────────────────────────────────────────────────
function render({ forecast, name }) {
  const daily = forecast.daily;
  const dates  = daily.time;
  const highs  = daily.temperature_2m_max;
  const lows   = daily.temperature_2m_min;
  const codes  = daily.weathercode;
  const rain   = daily.precipitation_sum;
  const wind   = daily.windspeed_10m_max;
  const sym    = unitSymbol();

  // Sky theme based on today's weather code
  setTheme(wmo(codes[0]).theme);

  // Location heading
  const heading = document.getElementById('location-heading');
  heading.textContent = '📍 ' + name;
  heading.classList.add('visible');

  // Cards
  const grid = document.getElementById('forecast-grid');
  grid.innerHTML = '';
  dates.forEach((dateStr, i) => {
    const d = new Date(dateStr + 'T12:00:00');
    const info = wmo(codes[i]);
    const delayMs = i * 60;

    const card = document.createElement('div');
    card.className = 'day-card';
    card.style.animationDelay = delayMs + 'ms';
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-day">${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
      <div class="card-date">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      <div class="card-icon">${info.emoji}</div>
      <div class="card-desc">${info.label}</div>
      <div class="card-high">${Math.round(highs[i])}${sym}</div>
      <div class="card-low">${Math.round(lows[i])}${sym}</div>
      <div class="card-rain">💧 ${rain[i] != null ? rain[i].toFixed(2)+'"' : '—'}</div>
    `;
    card.addEventListener('click', () => showDetail(i, { dates, highs, lows, codes, rain, wind, sym }));
    grid.appendChild(card);
  });

  // Chart
  renderChart(dates, highs, lows, sym);
  document.getElementById('chart-panel').classList.add('visible');

  // Hide skeleton / status
  setStatus('');

  // Auto-select today
  setTimeout(() => showDetail(0, { dates, highs, lows, codes, rain, wind, sym }), 400);
}

function renderChart(dates, highs, lows, sym) {
  const labels = dates.map(d => {
    const dt = new Date(d + 'T12:00:00');
    return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  });

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  const ctx = document.getElementById('tempChart').getContext('2d');
  chartInst = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: `High (${sym})`,
          data: highs,
          borderColor: '#f97316',
          backgroundColor: 'rgba(249,115,22,0.1)',
          pointBackgroundColor: '#f97316',
          pointRadius: 5,
          pointHoverRadius: 8,
          fill: false,
          tension: 0.35,
          borderWidth: 2.5,
        },
        {
          label: `Low (${sym})`,
          data: lows,
          borderColor: '#60a5fa',
          backgroundColor: 'rgba(96,165,250,0.12)',
          pointBackgroundColor: '#60a5fa',
          pointRadius: 5,
          pointHoverRadius: 8,
          fill: '-1',
          tension: 0.35,
          borderWidth: 2.5,
        },
      ],
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: 'rgba(255,255,255,0.8)', usePointStyle: true, pointStyleWidth: 10 },
        },
        tooltip: {
          backgroundColor: 'rgba(0,0,0,0.65)',
          titleColor: '#fff',
          bodyColor: 'rgba(255,255,255,0.8)',
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${Math.round(ctx.raw)}${sym}`,
          },
        },
      },
      scales: {
        x: { ticks: { color: 'rgba(255,255,255,0.65)', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.08)' } },
        y: {
          ticks: { color: 'rgba(255,255,255,0.65)', callback: v => Math.round(v) + sym, font: { size: 11 } },
          grid: { color: 'rgba(255,255,255,0.08)' },
        },
      },
    },
  });
}

function showDetail(i, { dates, highs, lows, codes, rain, wind, sym }) {
  // Highlight card
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`.day-card[data-index="${i}"]`);
  if (card) card.classList.add('selected');

  const info = wmo(codes[i]);
  const d    = new Date(dates[i] + 'T12:00:00');
  const panel = document.getElementById('detail-panel');

  panel.innerHTML = `
    <div class="detail-icon">${info.emoji}</div>
    <div class="detail-info">
      <h2>${d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</h2>
      <p>${info.label}</p>
    </div>
    <div class="detail-stats">
      <div class="stat">
        <div class="stat-label">High</div>
        <div class="stat-value" style="color:#fbbf24">${Math.round(highs[i])}${sym}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Low</div>
        <div class="stat-value" style="color:#93c5fd">${Math.round(lows[i])}${sym}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Precip</div>
        <div class="stat-value">${rain[i] != null ? rain[i].toFixed(2)+'"' : '—'}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-value">${wind[i] != null ? Math.round(wind[i])+' mph' : '—'}</div>
      </div>
    </div>
  `;
  panel.classList.add('visible');
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function setStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function clearForecast() {
  document.getElementById('forecast-grid').innerHTML = '';
  document.getElementById('location-heading').classList.remove('visible');
  document.getElementById('chart-panel').classList.remove('visible');
  const dp = document.getElementById('detail-panel');
  dp.classList.remove('visible');
  if (chartInst) { chartInst.destroy(); chartInst = null; }
}

function showSkeletons() {
  const grid = document.getElementById('forecast-grid');
  grid.innerHTML = Array(7).fill('<div class="skeleton"></div>').join('');
}

function setTheme(theme) {
  document.body.className = theme || '';
}

// ── Keyboard shortcut ──────────────────────────────────────────────────────
document.getElementById('city-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});
</script>
</body>
</html>
